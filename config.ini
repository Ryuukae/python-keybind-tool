[Keybinds]
open_downloads = ctrl+alt+F12
open_userprofile = ctrl+alt+F9
open_chrome = ctrl+alt+c
save_to_history = ctrl+c

[Directory Paths]
downloads = %USERPROFILE%\Downloads
music = %USERPROFILE%\Music
videos = %USERPROFILE%\Videos
userprofile = %USERPROFILE%
desktop = %USERPROFILE%\Desktop
documents = %USERPROFILE%\Documents
pictures = %USERPROFILE%\Pictures
appdata = %APPDATA%
localappdata = %LOCALAPPDATA%
programfiles = %PROGRAMFILES%
programfilesx86 = %PROGRAMFILES(X86)%
programdata = %PROGRAMDATA%
windows = %WINDIR%
system32 = %WINDIR%\System32
syswow64 = %WINDIR%\SysWOW64
temp = %TEMP%
public = %PUBLIC%
test = C:\test

[Application Paths]
chrome_path = %PROGRAMFILES%\Google\Chrome\Application\chrome.exe
steam_path = %PROGRAMFILES(X86)%\Steam\steam.exe
discord_path = %LOCALAPPDATA%\Discord
obs_studio_path = %PROGRAMFILES%\obs-studio\bin\64bit\obs64.exe
vscode_path = %LOCALAPPDATA%\Programs\Microsoft VS Code\Code.exe
python_path = %LOCALAPPDATA%\Programs\Python
mysql_path = %PROGRAMFILES%\MySQL
git_path = %PROGRAMFILES%\Git\cmd\git.exe
edge_path = %PROGRAMFILES(X86)%\Microsoft\Edge\Application\msedge.exe
spotify_path = %APPDATA%\Spotify\Spotify.exe
vlc_path = %PROGRAMFILES%\VideoLAN\VLC\vlc.exe

